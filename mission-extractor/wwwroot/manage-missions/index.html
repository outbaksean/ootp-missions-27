<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Manage Missions</title>
<style>
* { box-sizing: border-box; }
body { font-family: monospace; font-size: 13px; background: #fff; color: #111; margin: 0; padding: 0; height: 100vh; overflow: hidden; }

/* Two-panel layout */
#layout { display: flex; height: 100vh; }
#left-panel { width: 65%; min-width: 200px; flex-shrink: 0; display: flex; flex-direction: column; }
#left-panel-scroll { flex: 1; overflow-y: auto; padding: 16px; }
#left-panel-footer { padding: 8px 16px; border-top: 1px solid #ddd; background: #fff; flex-shrink: 0; }
#divider { width: 6px; background: #ddd; cursor: col-resize; flex-shrink: 0; }
#divider:hover, #divider.dragging { background: #aaa; }
#right-panel { flex: 1; min-width: 150px; overflow-y: auto; padding: 16px; border-left: 1px solid #ddd; }

/* Existing styles */
h1 { font-size: 1em; margin: 0 0 12px; }
.controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
button { font-family: monospace; font-size: 13px; padding: 4px 10px; cursor: pointer; border: 1px solid #999; background: #f4f4f4; }
button:hover { background: #e4e4e4; }
pre#log { background: #f8f8f8; border: 1px solid #ddd; padding: 8px; height: 120px; overflow-y: auto; margin: 0 0 12px; white-space: pre-wrap; word-break: break-all; font-size: 12px; }
#missions { margin-top: 4px; }
details { border: 1px solid #ddd; margin-bottom: 8px; }
summary { padding: 6px 10px; cursor: pointer; background: #f4f4f4; font-weight: bold; list-style: none; }
summary::-webkit-details-marker { display: none; }
.mission-body { padding: 10px 12px; }
.field-row { margin-bottom: 10px; }
.field-label { display: block; font-weight: bold; margin-bottom: 3px; color: #555; }
.field-row input[type="text"] { font-family: monospace; font-size: 13px; padding: 3px 6px; border: 1px solid #bbb; width: 100%; max-width: 600px; }
.error-star { color: #c00; font-weight: bold; margin-left: 4px; }
.mission-errors { background: #fff8f8; border: 1px solid #f5c6c6; padding: 6px 10px; margin-bottom: 10px; font-size: 12px; color: #c00; }
.mission-errors div { margin: 1px 0; }
.mission-json { background: #f8f8f8; border: 1px solid #eee; padding: 8px 10px; margin-bottom: 10px; font-size: 11px; max-height: 200px; overflow-y: auto; white-space: pre; }
.debug-imgs { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 4px; }
.debug-imgs img { max-height: 80px; image-rendering: pixelated; border: 1px solid #ccc; }
.save-row { margin-top: 10px; display: flex; align-items: center; gap: 10px; }
.save-status { font-size: 12px; color: #555; }
.save-status.error { color: #c00; }
.btn-delete { font-family: monospace; font-size: 13px; padding: 4px 10px; cursor: pointer; border: 1px solid #c00; background: #fff; color: #c00; }
.btn-delete:hover { background: #fff0f0; }
.detail-entry { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.detail-entry input[type="text"] { flex: 1; max-width: 560px; }
.detail-entry img { display: block; max-height: 80px; image-rendering: pixelated; border: 1px solid #ccc; }

/* Boundaries panel */
#boundaries { padding: 6px 0; border-top: 1px solid #eee; margin-bottom: 6px; }
#boundaries-grid { display: grid; grid-template-columns: repeat(4, auto); gap: 4px 16px; margin-bottom: 6px; }
.bnd-field { display: flex; align-items: center; gap: 5px; font-size: 12px; }
.bnd-field label { color: #555; white-space: nowrap; }
.bnd-field input { width: 4.5em; font-family: monospace; font-size: 12px; padding: 2px 4px; border: 1px solid #bbb; }

/* Rewards */
.reward-entry { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; flex-wrap: wrap; }
.reward-entry input[type="text"] { font-family: monospace; font-size: 13px; padding: 3px 6px; border: 1px solid #bbb; width: 130px; }
.reward-entry input[type="number"] { font-family: monospace; font-size: 13px; padding: 3px 6px; border: 1px solid #bbb; width: 60px; }
.reward-entry select { font-family: monospace; font-size: 13px; padding: 3px 6px; border: 1px solid #bbb; background: #f4f4f4; }
.reward-type-badge { font-size: 11px; background: #e8e8e8; border: 1px solid #ccc; padding: 1px 5px; min-width: 34px; text-align: center; }
.reward-field-label { font-size: 12px; color: #666; white-space: nowrap; }

/* Cards panel */
#cards-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
#cards-header h2 { font-size: 1em; margin: 0; flex-shrink: 0; }
#cards-search { font-family: monospace; font-size: 13px; padding: 3px 6px; border: 1px solid #bbb; flex: 1; min-width: 80px; }
#cards-count { font-size: 12px; color: #666; white-space: nowrap; }
#cards-table { width: 100%; border-collapse: collapse; font-size: 12px; }
#cards-table th { text-align: left; padding: 4px 8px; border-bottom: 2px solid #ccc; background: #f4f4f4; cursor: pointer; white-space: nowrap; user-select: none; position: sticky; top: 0; }
#cards-table th:hover { background: #e4e4e4; }
#cards-table th.sort-asc::after { content: ' \25B2'; font-size: 10px; }
#cards-table th.sort-desc::after { content: ' \25BC'; font-size: 10px; }
#cards-table th:nth-child(3), #cards-table th:nth-child(4) { text-align: right; }
#cards-table td { padding: 3px 8px; border-bottom: 1px solid #eee; }
#cards-table td:nth-child(1) { padding: 2px 4px; }
#cards-table td:nth-child(3), #cards-table td:nth-child(4) { text-align: right; }
#cards-table tr:hover td { background: #f8f8f8; }
</style>
</head>
<body>

<div id="layout">
  <div id="left-panel">
    <div id="left-panel-scroll">
      <nav style="margin-bottom:10px;font-size:12px;">
        <a href="/">Mission Extractor</a> &nbsp;|&nbsp; <strong>Manage Missions</strong> &nbsp;|&nbsp; <a href="/live-mission-helper/">Live Mission Helper</a>
      </nav>
      <h1 id="page-title">Manage Missions</h1>
      <div id="verified-count" style="font-size:12px;color:#555;margin:-8px 0 10px;"></div>

      <div class="controls">
        <input type="text" id="mission-search" placeholder="Search missions..." style="font-family:monospace;font-size:13px;padding:3px 6px;border:1px solid #bbb;flex:1;min-width:150px;max-width:300px;">
        <select id="category-filter" style="font-family:monospace;font-size:13px;padding:3px 6px;border:1px solid #bbb;background:#f4f4f4;">
          <option value="">All Categories</option>
        </select>
      </div>
      <div class="controls">
        <button onclick="runLoadFinalFormat()">Load Final Format Missions</button>
        <button onclick="runLoadAndCleanFinalFormat()">Load and Clean Final Format Missions</button>
        <input type="file" id="file-input-final-format" accept=".json" style="display:none">
        <input type="file" id="file-input-and-clean-final-format" accept=".json" style="display:none">
      </div>
      <div class="controls">
        <button onclick="runTransform()">Transform</button>
        <button onclick="runReorder()">Reorder</button>
        <button onclick="runSaveWorking()">Save Scratch Missions</button>
        <button onclick="runLoadWorking()">Load Scratch Missions</button>
        <button onclick="runClearMissions()">Clear Missions</button>
        <button id="btn-hide-verified" onclick="toggleHideVerified()">Hide Verified</button>
      </div>
      <div class="controls">
        <button onclick="runLoadVerified()">Load Verified Missions</button>
        <button onclick="runSaveVerified()">Save Verified Missions</button>
        <button onclick="runLoadAndCleanVerified()">Load and Clean Verified Missions</button>
      </div>

      <pre id="log">Ready.</pre>

      <div id="missions"></div>
    </div>
    <div id="left-panel-footer">
      <div id="boundaries" style="display:none">
        <div id="boundaries-grid">
          <div class="bnd-field"><label>TopRowOffset</label><input type="number" id="bnd-topRowOffset"></div>
          <div class="bnd-field"><label>TopRow</label><input type="number" id="bnd-topRow"></div>
          <div class="bnd-field"><label>RowHeight</label><input type="number" id="bnd-rowHeight"></div>
          <div class="bnd-field"><label>NumRows</label><input type="number" id="bnd-numRows"></div>
          <div class="bnd-field"><label>CategoryLeft</label><input type="number" id="bnd-categoryLeft"></div>
          <div class="bnd-field"><label>CategoryRight</label><input type="number" id="bnd-categoryRight"></div>
          <div class="bnd-field"><label>TitleLeft</label><input type="number" id="bnd-titleLeft"></div>
          <div class="bnd-field"><label>TitleRight</label><input type="number" id="bnd-titleRight"></div>
          <div class="bnd-field"><label>RewardLeft</label><input type="number" id="bnd-rewardLeft"></div>
          <div class="bnd-field"><label>RewardRight</label><input type="number" id="bnd-rewardRight"></div>
          <div class="bnd-field"><label>StatusLeft</label><input type="number" id="bnd-statusLeft"></div>
          <div class="bnd-field"><label>StatusRight</label><input type="number" id="bnd-statusRight"></div>
          <div class="bnd-field"><label>DetailLeft</label><input type="number" id="bnd-detailLeft"></div>
          <div class="bnd-field"><label>DetailWidth</label><input type="number" id="bnd-detailWidth"></div>
          <div class="bnd-field"><label>DetailColumns</label><input type="number" id="bnd-detailColumns"></div>
          <div class="bnd-field"><label>DetailHeight</label><input type="number" id="bnd-detailHeight"></div>
          <div class="bnd-field"><label>DetailUpperOffsetY</label><input type="number" id="bnd-detailUpperOffsetY"></div>
          <div class="bnd-field"><label>DetailSkipY</label><input type="number" id="bnd-detailSkipY"></div>
          <div class="bnd-field"><label>DetailNoImagesHeight</label><input type="number" id="bnd-detailNoImagesHeight"></div>
          <div class="bnd-field"><label>DetailLowerOffsetY</label><input type="number" id="bnd-detailLowerOffsetY"></div>
        </div>
        <button onclick="applyBoundaries()">Apply Boundaries</button>
      </div>
      <div class="controls" style="margin-bottom:0">
        <button onclick="runValidate()">Validate</button>
        <button onclick="runSaveDialog()">Save As...</button>
        <button onclick="runLoadDialog()">Load From...</button>
        <button onclick="runDeleteDebugImages()">Delete Debug Images</button>
        <input type="file" id="file-input-verified" accept=".json" style="display:none">
        <input type="file" id="file-input" accept=".json" style="display:none">
      </div>
    </div>
  </div>

  <div id="divider"></div>

  <div id="right-panel">
    <div id="cards-header">
      <h2>Shop Cards</h2>
      <input type="text" id="cards-search" placeholder="Filter by title...">
      <span id="cards-count"></span>
    </div>
    <table id="cards-table">
      <thead>
        <tr>
          <th></th>
          <th data-col="title">Title</th>
          <th data-col="cardId">Card ID</th>
          <th data-col="cardValue">Value</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<datalist id="reward-card-titles-datalist"></datalist>

<script>
// ── Missions state ─────────────────────────────────────────────────────────────

let fieldErrors = {};
let cachedMissions = [];
let hideVerified = false;
let missionSearch = '';
let categoryFilter = '';

function buildFieldErrorsFromLoadWarnings(warnings, missions) {
  const nameToId = {};
  for (const m of missions)
    if (m.name) nameToId[m.name.trim().toLowerCase()] = m.id;
  const map = {};
  for (const w of warnings) {
    const match = w.match(/^'([^']+)':\s*(.+)$/);
    if (!match) continue;
    const id = nameToId[match[1].trim().toLowerCase()];
    if (id == null) continue;
    if (!map[id]) map[id] = [];
    map[id].push(match[2]);
  }
  return map;
}

function errorTypeToField(errorType) {
  if (errorType === 'Name Blank') return 'name';
  if (errorType.startsWith('Category')) return 'category';
  if (errorType === 'Reward Blank') return 'reward';
  if (errorType === 'Status Blank' || errorType === 'Type Unparsed') return 'status';
  return 'missionDetails';
}

function buildErrorMap(errors) {
  const map = {};
  for (const e of errors) {
    if (!map[e.missionId]) map[e.missionId] = [];
    map[e.missionId].push(e.errorType);
  }
  return map;
}

function setLog(text) {
  document.getElementById('log').textContent = text;
}

function appendLog(text) {
  const el = document.getElementById('log');
  el.textContent += text;
  el.scrollTop = el.scrollHeight;
}

function updateTitle(count) {
  document.getElementById('page-title').textContent =
    'Manage Missions \u2014 ' + count + ' mission(s)';
}

async function refreshMissions() {
  const res = await fetch('/api/missions');
  const data = await res.json();
  cachedMissions = data.missions;
  updateTitle(data.count);
  rebuildCategoryDropdown();
  applyAndRenderMissions();
}

function rebuildCategoryDropdown() {
  const select = document.getElementById('category-filter');
  const current = select.value;
  const categories = [...new Set(cachedMissions.map(m => m.category).filter(Boolean))].sort();
  select.innerHTML = '<option value="">All Categories</option>';
  for (const cat of categories) {
    const opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = cat;
    select.appendChild(opt);
  }
  select.value = categories.includes(current) ? current : '';
  if (select.value !== current) categoryFilter = '';
}

function applyAndRenderMissions() {
  const verified = cachedMissions.filter(m => m.verified).length;
  const unverified = cachedMissions.length - verified;

  let toShow = hideVerified ? cachedMissions.filter(m => !m.verified) : cachedMissions;
  if (missionSearch) {
    const lower = missionSearch.toLowerCase();
    toShow = toShow.filter(m => (m.name || '').toLowerCase().includes(lower));
  }
  if (categoryFilter)
    toShow = toShow.filter(m => m.category === categoryFilter);

  const filterActive = missionSearch || categoryFilter || hideVerified;
  let countText = cachedMissions.length > 0 ? `${verified} verified, ${unverified} unverified` : '';
  if (filterActive && cachedMissions.length > 0) countText += ` \u2014 showing ${toShow.length} of ${cachedMissions.length}`;
  document.getElementById('verified-count').textContent = countText;

  renderMissions(toShow);
}

function toggleHideVerified() {
  hideVerified = !hideVerified;
  const btn = document.getElementById('btn-hide-verified');
  btn.textContent = hideVerified ? 'Show Verified' : 'Hide Verified';
  btn.style.fontWeight = hideVerified ? 'bold' : '';
  applyAndRenderMissions();
}

function renderMissions(missions) {
  const container = document.getElementById('missions');
  container.innerHTML = '';
  for (const m of missions) {
    container.appendChild(buildMissionElement(m));
  }
}

function buildActionRow(m) {
  const saveRow = document.createElement('div');
  saveRow.className = 'save-row';

  if (m.readOnly) {
    const badge = document.createElement('span');
    badge.className = 'save-status';
    badge.textContent = 'Imported (read-only)';
    saveRow.appendChild(badge);
  } else {
    const saveBtn = document.createElement('button');
    saveBtn.textContent = 'Save';
    saveBtn.onclick = function() { saveMission(this); };
    const saveStatus = document.createElement('span');
    saveStatus.className = 'save-status';
    saveRow.appendChild(saveBtn);
    saveRow.appendChild(saveStatus);

    const hasErrors = (fieldErrors[m.id] ?? []).length > 0;
    if (!hasErrors || m.verified) {
      const verifyBtn = document.createElement('button');
      verifyBtn.textContent = m.verified ? 'Unverify' : 'Mark Verified';
      if (m.verified) verifyBtn.style.cssText = 'border-color: #090; color: #090;';
      verifyBtn.onclick = function() { toggleVerify(m.id, !m.verified); };
      saveRow.appendChild(verifyBtn);
    }
  }

  if (!m.readOnly) {
    const reverseBtn = document.createElement('button');
    reverseBtn.textContent = 'Reverse Parse';
    reverseBtn.onclick = function() { missionReverseParse(this); };
    saveRow.appendChild(reverseBtn);
  }

  const transformBtn = document.createElement('button');
  transformBtn.textContent = 'Transform';
  transformBtn.onclick = function() { runTransform(); };
  saveRow.appendChild(transformBtn);

  const deleteBtn = document.createElement('button');
  deleteBtn.textContent = 'Delete Mission';
  deleteBtn.className = 'btn-delete';
  deleteBtn.onclick = function() { deleteMission(this); };
  saveRow.appendChild(deleteBtn);

  return saveRow;
}

function buildMissionElement(m) {
  const det = document.createElement('details');
  det.dataset.id = m.id;

  const sum = document.createElement('summary');
  sum.textContent = summaryText(m);
  det.appendChild(sum);

  const body = document.createElement('div');
  body.className = 'mission-body';

  body.appendChild(buildActionRow(m));

  const missionErrorTypes = fieldErrors[m.id] ?? [];

  if (missionErrorTypes.length > 0) {
    const errBlock = document.createElement('div');
    errBlock.className = 'mission-errors';
    for (const e of missionErrorTypes) {
      const row = document.createElement('div');
      row.textContent = e;
      errBlock.appendChild(row);
    }
    body.appendChild(errBlock);
  }

  for (const field of ['name', 'category', 'reward', 'status']) {
    body.appendChild(buildTextField(field, m[field] ?? '', m.debugImages, missionErrorTypes, m.readOnly));
  }

  body.appendChild(buildRewardsField(m.rewards ?? [], m.readOnly));

  const jsonDetails = document.createElement('details');
  const jsonSummary = document.createElement('summary');
  jsonSummary.textContent = 'JSON';
  jsonDetails.appendChild(jsonSummary);
  const { status, missionDetails, debugImages, ...finalFields } = m;
  const pre = document.createElement('pre');
  pre.className = 'mission-json';
  pre.textContent = JSON.stringify(finalFields, null, 2);
  jsonDetails.appendChild(pre);
  body.appendChild(jsonDetails);

  body.appendChild(buildDetailsField(m.missionDetails ?? [], m.debugImages, missionErrorTypes, m.readOnly));

  body.appendChild(buildActionRow(m));

  det.appendChild(body);
  return det;
}

function summaryText(m) {
  return (m.readOnly ? '[R] ' : '') + '[' + m.id + '] ' + (m.name || '') +
    '  (' + (m.category || '') + ')' +
    '  |  ' + (m.type || '') +
    '  |  ' + (m.status || '');
}

function buildTextField(field, value, debugImages, missionErrorTypes, readOnly = false) {
  const row = document.createElement('div');
  row.className = 'field-row';

  const hasError = missionErrorTypes.some(e => errorTypeToField(e) === field);

  const label = document.createElement('label');
  label.className = 'field-label';
  label.textContent = field;
  if (hasError) {
    const star = document.createElement('span');
    star.className = 'error-star';
    star.textContent = '*';
    label.appendChild(star);
  }
  row.appendChild(label);

  const input = document.createElement('input');
  input.type = 'text';
  input.dataset.field = field;
  input.value = value;
  if (readOnly) input.disabled = true;
  row.appendChild(input);

  if (field === 'status' && !readOnly) {
    const btnRow = document.createElement('div');
    btnRow.style.cssText = 'display:flex;gap:6px;margin-top:4px;';
    const presets = [
      { label: 'Set Type Count',    value: '0 / 1 out of 1' },
      { label: 'Set Type Points',   value: '0 / 1 Points' },
      { label: 'Set Type Missions', value: '0 / 1 Missions' },
    ];
    for (const preset of presets) {
      const btn = document.createElement('button');
      btn.textContent = preset.label;
      btn.onclick = function() { input.value = preset.value; };
      btnRow.appendChild(btn);
    }
    row.appendChild(btnRow);
  }

  const imgs = debugImages?.[field];
  if (imgs && imgs.length > 0) {
    const imgContainer = document.createElement('div');
    imgContainer.className = 'debug-imgs';
    for (const imgPath of imgs) {
      const filename = imgPath.split(/[\\/]/).pop();
      const img = document.createElement('img');
      img.src = '/debug-images/' + filename;
      img.alt = field + ' debug image';
      imgContainer.appendChild(img);
    }
    row.appendChild(imgContainer);
  }

  return row;
}

function buildDetailsField(details, debugImages, missionErrorTypes, readOnly = false) {
  const row = document.createElement('div');
  row.className = 'field-row';
  row.dataset.fieldContainer = 'missionDetails';

  const detailErrors = missionErrorTypes.filter(e => errorTypeToField(e) === 'missionDetails');
  const errorIndices = new Set();
  let aggregateError = false;

  for (const e of detailErrors) {
    let target = null;
    if (e.startsWith('Card Not Found: '))
      target = e.slice('Card Not Found: '.length).trim();
    else if (e.startsWith('Mission Not Found: '))
      target = e.slice('Mission Not Found: '.length).trim();
    else if (e.startsWith('Points Mismatch: '))
      target = e.slice('Points Mismatch: '.length).replace(/ \(expected.*/, '').trim();

    if (target !== null)
      details.forEach((d, i) => { if (d.trim() === target) errorIndices.add(i); });
    else
      aggregateError = true;
  }

  const label = document.createElement('label');
  label.className = 'field-label';
  label.textContent = 'missionDetails';
  if (aggregateError) {
    const star = document.createElement('span');
    star.className = 'error-star';
    star.textContent = '*';
    label.appendChild(star);
  }
  row.appendChild(label);

  const imgs = debugImages?.['missionDetails'] ?? [];
  const count = Math.max(details.length, 1);

  for (let i = 0; i < count; i++) {
    const entry = document.createElement('div');
    entry.className = 'detail-entry';

    const input = document.createElement('input');
    input.type = 'text';
    input.dataset.field = 'missionDetails';
    input.value = details[i] ?? '';
    if (readOnly) input.disabled = true;
    entry.appendChild(input);

    if (errorIndices.has(i)) {
      const star = document.createElement('span');
      star.className = 'error-star';
      star.textContent = '*';
      entry.appendChild(star);
    }

    if (!readOnly) {
      const removeBtn = document.createElement('button');
      removeBtn.textContent = 'Remove';
      removeBtn.className = 'btn-delete';
      removeBtn.onclick = function() { entry.remove(); };
      entry.appendChild(removeBtn);
    }

    if (i < imgs.length) {
      const filename = imgs[i].split(/[\\/]/).pop();
      const img = document.createElement('img');
      img.src = '/debug-images/' + filename;
      img.alt = 'missionDetails debug image';
      entry.appendChild(img);
    }

    row.appendChild(entry);
  }

  if (!readOnly) {
    const addBtn = document.createElement('button');
    addBtn.textContent = 'Add Detail';
    addBtn.style.cssText = 'margin-top:4px;';
    addBtn.onclick = function() {
      const entry = document.createElement('div');
      entry.className = 'detail-entry';

      const input = document.createElement('input');
      input.type = 'text';
      input.dataset.field = 'missionDetails';
      input.value = '';
      entry.appendChild(input);

      const removeBtn = document.createElement('button');
      removeBtn.textContent = 'Remove';
      removeBtn.className = 'btn-delete';
      removeBtn.onclick = function() { entry.remove(); };
      entry.appendChild(removeBtn);

      row.insertBefore(entry, addBtn);
      input.focus();
    };
    row.appendChild(addBtn);
  }

  return row;
}

const PACK_TYPE_NAMES = {
  Standard: 'Standard Pack', Silver: 'Silver Pack', Gold: 'Gold Pack', Diamond: 'Diamond Pack',
  Perfect: 'Perfect Pack', Rainbow: 'Rainbow Pack', HistSilver: 'Historical Silver Pack',
  HistGold: 'Historical Gold Pack', HistDiamond: 'Historical Diamond Pack',
  HistPerfect: 'Historical Perfect Pack', HistRainbow: 'Historical Rainbow Pack',
  AllPerfect: 'All-Perfect Pack', HistAllPerfect: 'Historical All-Perfect Pack',
  AllDiamond: 'All-Diamond Pack', HistAllDiamond: 'Historical All-Diamond Pack',
  MoneyballDiamond: 'Moneyball Era Diamond Pack', AnalyticsDiamond: 'Analytics Era Diamond Pack',
  PowerDiamond: 'Power Era Diamond Pack', DefensiveDiamond: 'Defensive Era Diamond Pack',
  SpotlightImmortals: 'Spotlight #Immortals Pack',
};

function generateRewardStringFromDOM(det) {
  const parts = [];
  for (const entry of det.querySelectorAll('[data-rewards-container] [data-reward-type]')) {
    const type = entry.dataset.rewardType;
    if (type === 'park') {
      const park = entry.querySelector('[data-reward-field="park"]')?.value?.trim();
      if (park) parts.push(`Park: ${park}`);
    } else if (type === 'pack') {
      const packType = entry.querySelector('[data-reward-field="packType"]')?.value;
      const count = parseInt(entry.querySelector('[data-reward-field="count"]')?.value, 10) || 1;
      const name = PACK_TYPE_NAMES[packType] ?? packType ?? 'Pack';
      parts.push(count > 1 ? `${count}x ${name}` : name);
    } else if (type === 'card') {
      const title = entry.querySelector('[data-reward-field="cardTitle"]')?.value?.trim();
      if (title) parts.push(title);
    }
  }
  return parts.join(', ');
}

function missionReverseParse(btn) {
  const det = btn.closest('details');
  const id = parseInt(det.dataset.id, 10);
  const mission = cachedMissions.find(m => m.id === id);

  const rewardInput = det.querySelector('input[data-field="reward"]');
  if (rewardInput && !rewardInput.value.trim())
    rewardInput.value = generateRewardStringFromDOM(det);

  const statusInput = det.querySelector('input[data-field="status"]');
  if (statusInput && !statusInput.value.trim() && mission?.type) {
    const n = mission.requiredCount ?? 1;
    const typeMap = { count: `0 / ${n} out of ${n}`, points: `0 / ${n} Points`, missions: `0 / ${n} Missions` };
    const generated = typeMap[mission.type];
    if (generated) statusInput.value = generated;
  }

  if (mission?.cards?.length > 0) {
    const detailsRow = det.querySelector('[data-field-container="missionDetails"]');
    if (detailsRow) {
      const existing = detailsRow.querySelectorAll('input[data-field="missionDetails"]');
      if (existing.length === 0 || Array.from(existing).every(i => !i.value.trim())) {
        detailsRow.querySelectorAll('.detail-entry').forEach(e => e.remove());
        const addBtn = detailsRow.querySelector('button:not(.btn-delete)');
        for (const card of mission.cards) {
          const title = allCards.find(c => c.cardId === card.cardId)?.title ?? String(card.cardId);
          const entry = document.createElement('div');
          entry.className = 'detail-entry';
          const input = document.createElement('input');
          input.type = 'text'; input.dataset.field = 'missionDetails'; input.value = title;
          entry.appendChild(input);
          const removeBtn = document.createElement('button');
          removeBtn.textContent = 'Remove'; removeBtn.className = 'btn-delete';
          removeBtn.onclick = function() { entry.remove(); };
          entry.appendChild(removeBtn);
          detailsRow.insertBefore(entry, addBtn);
        }
      }
    }
  }
}

function buildRewardEntry(reward, readOnly) {
  const entry = document.createElement('div');
  entry.className = 'reward-entry';
  entry.dataset.rewardType = reward.type;

  const badge = document.createElement('span');
  badge.className = 'reward-type-badge';
  badge.textContent = reward.type;
  entry.appendChild(badge);

  if (reward.type === 'card') {
    const lbl = document.createElement('span'); lbl.className = 'reward-field-label'; lbl.textContent = 'card:'; entry.appendChild(lbl);
    const inp = document.createElement('input'); inp.type = 'text'; inp.dataset.rewardField = 'cardTitle';
    inp.setAttribute('list', 'reward-card-titles-datalist');
    const existingTitle = reward.cardId ? (allCards.find(c => c.cardId === reward.cardId)?.title ?? '') : (reward.cardTitle ?? '');
    inp.value = existingTitle; inp.disabled = readOnly; inp.style.width = '220px'; entry.appendChild(inp);
  } else if (reward.type === 'pack') {
    const lbl = document.createElement('span'); lbl.className = 'reward-field-label'; lbl.textContent = 'packType:'; entry.appendChild(lbl);
    const sel = document.createElement('select'); sel.dataset.rewardField = 'packType'; sel.disabled = readOnly;
    for (const [value, name] of Object.entries(PACK_TYPE_NAMES)) {
      const opt = document.createElement('option'); opt.value = value; opt.textContent = name;
      if (value === reward.packType) opt.selected = true;
      sel.appendChild(opt);
    }
    entry.appendChild(sel);
  } else if (reward.type === 'park') {
    const lbl = document.createElement('span'); lbl.className = 'reward-field-label'; lbl.textContent = 'park:'; entry.appendChild(lbl);
    const inp = document.createElement('input'); inp.type = 'text'; inp.dataset.rewardField = 'park';
    inp.value = reward.park ?? ''; inp.disabled = readOnly; entry.appendChild(inp);
  }

  if (reward.type === 'pack') {
    const countLbl = document.createElement('span'); countLbl.className = 'reward-field-label'; countLbl.textContent = 'count:'; entry.appendChild(countLbl);
    const countInp = document.createElement('input'); countInp.type = 'number'; countInp.dataset.rewardField = 'count';
    countInp.value = reward.count ?? 1; countInp.disabled = readOnly; entry.appendChild(countInp);
  }

  if (!readOnly) {
    const removeBtn = document.createElement('button');
    removeBtn.textContent = 'Remove'; removeBtn.className = 'btn-delete';
    removeBtn.onclick = () => entry.remove();
    entry.appendChild(removeBtn);
  }
  return entry;
}

function buildRewardsField(rewards, readOnly) {
  const row = document.createElement('div');
  row.className = 'field-row';

  const label = document.createElement('label');
  label.className = 'field-label';
  label.textContent = 'rewards';
  row.appendChild(label);

  const container = document.createElement('div');
  container.dataset.rewardsContainer = '1';
  for (const r of (rewards ?? [])) container.appendChild(buildRewardEntry(r, readOnly));
  row.appendChild(container);

  if (!readOnly) {
    const btnRow = document.createElement('div');
    btnRow.style.cssText = 'display:flex;gap:6px;margin-top:4px;';
    for (const [type, label] of [['card', 'Add Card'], ['pack', 'Add Packs'], ['park', 'Add Parks']]) {
      const btn = document.createElement('button');
      btn.textContent = label;
      btn.onclick = () => container.appendChild(buildRewardEntry({ type, count: 1 }, false));
      btnRow.appendChild(btn);
    }
    row.appendChild(btnRow);
  }

  return row;
}

function collectRewardsFromElement(det) {
  const entries = det.querySelectorAll('[data-rewards-container] [data-reward-type]');
  return Array.from(entries).map(entry => {
    const type = entry.dataset.rewardType;
    const obj = { type, count: parseInt(entry.querySelector('[data-reward-field="count"]')?.value, 10) || 0 };
    if (type === 'card') { const title = entry.querySelector('[data-reward-field="cardTitle"]')?.value?.trim(); if (title) { const card = allCards.find(c => c.title === title); if (card) obj.cardId = card.cardId; } }
    if (type === 'pack') { obj.packType = entry.querySelector('[data-reward-field="packType"]')?.value ?? null; }
    if (type === 'park') { obj.park = entry.querySelector('[data-reward-field="park"]')?.value ?? null; }
    return obj;
  });
}

async function saveMission(btn) {
  const det = btn.closest('details');
  const id = parseInt(det.dataset.id, 10);
  const statusEl = btn.nextElementSibling;

  const body = {};
  for (const input of det.querySelectorAll('input[data-field]:not([data-field="missionDetails"])')) {
    body[input.dataset.field] = input.value;
  }
  body.missionDetails = Array.from(det.querySelectorAll('input[data-field="missionDetails"]'))
    .map(i => i.value.trim())
    .filter(s => s.length > 0);
  body.rewards = collectRewardsFromElement(det);

  const res = await fetch('/api/missions/' + id, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (res.ok) {
    const updated = await res.json();
    det.querySelector('summary').textContent = summaryText(updated);
    statusEl.className = 'save-status';
    statusEl.textContent = 'Saved.';
    setTimeout(() => { statusEl.textContent = ''; }, 2000);
  } else {
    statusEl.className = 'save-status error';
    statusEl.textContent = 'Save failed (' + res.status + ')';
  }
}

    logText += '\n\n' + data.errors.length + ' validation error(s):\n';
    for (const e of data.errors) {
      logText += '  Mission ' + e.missionId + ' (' + e.missionName + '): ' + e.errorType + '\n';

  setLog(logText);
  refreshMissions();
}

document.getElementById('file-input-final-format').addEventListener('change', async function() {
  const file = this.files[0];
  if (!file) return;
  setLog('Loading final format missions...');
  let parsed;
  try {
    parsed = JSON.parse(await file.text());
  } catch {
    setLog('Invalid JSON file.');
    this.value = '';
    return;
  }

  if (Array.isArray(parsed) || !Array.isArray(parsed.missions)) {
    setLog('Invalid format: expected a missions.json file with { "version": "...", "missions": [...] }');
    this.value = '';
    return;
  }
  const missions = parsed.missions;
  if (missions.length === 0) { setLog('No missions found in file.'); this.value = ''; return; }

  const res = await fetch('/api/load-final-format', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ version: parsed.version, missions })
  });
  let data;
  try {
    data = await res.json();
  } catch {
    setLog('Load failed: server returned an unreadable response.');
    this.value = '';
    return;
  }
  if (!res.ok) { setLog(data.error ?? 'Load failed.'); this.value = ''; return; }
  let msg = `Loaded ${data.loadedCount} mission(s).`;
  if (data.markedVerifiedCount > 0) msg += ` Marked ${data.markedVerifiedCount} existing as verified.`;
  if (data.errors.length > 0) {
    msg += `\n${data.errors.length} warning(s):\n` + data.errors.map(e => '  ' + e).join('\n');
  }
  setLog(msg);
  await refreshMissions();
  if (data.errors.length > 0) {
    fieldErrors = buildFieldErrorsFromLoadWarnings(data.errors, cachedMissions);
    applyAndRenderMissions();
  }
  this.value = '';
});

async function runSaveDialog() {
  const res = await fetch('/api/missions');
  const data = await res.json();
  if (data.count === 0) { setLog('No missions to save.'); return; }
  const json = JSON.stringify(data.missions, null, 2);
  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: 'missions.json',
        types: [{ description: 'JSON Files', accept: { 'application/json': ['.json'] } }]
      });
      const writable = await handle.createWritable();
      await writable.write(json);
      await writable.close();
      setLog('Saved to ' + handle.name);
    } catch (e) {
      if (e.name !== 'AbortError') setLog('Save failed: ' + e.message);
    }
  } else {
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'missions.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setLog('Saved missions.json (downloaded — open in Chrome/Edge for a save dialog)');
  }
}

let allCards = [];
let cardSortCol = 'title';
let cardSortAsc = true;

async function loadCards() {
  const res = await fetch('/api/cards');
  allCards = await res.json();
  const dl = document.getElementById('reward-card-titles-datalist');
  dl.innerHTML = '';
  for (const c of allCards) {
    const opt = document.createElement('option');
    opt.value = c.title;
    dl.appendChild(opt);
  }
  renderCards();
}

function renderCards() {
  const filter = document.getElementById('cards-search').value.toLowerCase();
  const filtered = filter
    ? allCards.filter(c => c.title.toLowerCase().includes(filter))
    : allCards.slice();

  filtered.sort((a, b) => {
    const av = a[cardSortCol], bv = b[cardSortCol];
    const cmp = typeof av === 'number' ? av - bv : String(av).localeCompare(String(bv));
    return cardSortAsc ? cmp : -cmp;
  });

  const tbody = document.querySelector('#cards-table tbody');
  tbody.innerHTML = '';
  for (const c of filtered) {
    const tr = document.createElement('tr');

    const tdCopy = document.createElement('td');
    const copyBtn = document.createElement('button');
    copyBtn.textContent = 'Copy';
    copyBtn.style.cssText = 'padding:1px 5px;font-size:11px;';
    copyBtn.onclick = function() {
      navigator.clipboard.writeText(c.title).then(() => {
        copyBtn.textContent = 'Copied';
        setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1200);
      });
    };
    tdCopy.appendChild(copyBtn);

    const tdTitle = document.createElement('td');
    tdTitle.textContent = c.title;
    const tdId = document.createElement('td');
    tdId.textContent = c.cardId;
    const tdVal = document.createElement('td');
    tdVal.textContent = c.cardValue;
    tr.appendChild(tdCopy);
    tr.appendChild(tdTitle);
    tr.appendChild(tdId);
    tr.appendChild(tdVal);
    tbody.appendChild(tr);
  }

  const countEl = document.getElementById('cards-count');
  countEl.textContent = filter
    ? filtered.length + ' / ' + allCards.length
    : allCards.length + ' cards';

  // Update sort indicators
  for (const th of document.querySelectorAll('#cards-table th')) {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === cardSortCol)
      th.classList.add(cardSortAsc ? 'sort-asc' : 'sort-desc');
  }
}

document.querySelectorAll('#cards-table th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (cardSortCol === col) {
      cardSortAsc = !cardSortAsc;
    } else {
      cardSortCol = col;
      cardSortAsc = col === 'title';
    }
    renderCards();
  });
});

document.getElementById('cards-search').addEventListener('input', renderCards);

  'categoryLeft', 'categoryRight', 'titleLeft', 'titleRight',
  'rewardLeft', 'rewardRight', 'statusLeft', 'statusRight',
  'detailLeft', 'detailWidth', 'detailColumns', 'detailHeight',
  'detailUpperOffsetY', 'detailSkipY', 'detailNoImagesHeight', 'detailLowerOffsetY'
];

async function loadBoundaries() {
  const res = await fetch('/api/boundaries');
  if (!res.ok) return;
  const data = await res.json();
  document.getElementById('boundaries').style.display = data.allowBoundryEdits ? '' : 'none';
  if (!data.allowBoundryEdits) return;
  for (const field of boundaryFields) {
    const el = document.getElementById('bnd-' + field);
    if (el) el.value = data.boundaries[field] ?? 0;
  }
}

async function applyBoundaries() {
  const body = {};
  for (const field of boundaryFields) {
    const el = document.getElementById('bnd-' + field);
    body[field] = el ? parseInt(el.value, 10) || 0 : 0;
  }
  const res = await fetch('/api/boundaries', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (res.ok) setLog('Boundaries applied.');
  else setLog('Failed to apply boundaries.');
}

// ── Init ───────────────────────────────────────────────────────────────────────

document.getElementById('mission-search').addEventListener('input', function() {
  missionSearch = this.value;
  applyAndRenderMissions();
});

document.getElementById('category-filter').addEventListener('change', function() {
  categoryFilter = this.value;
  applyAndRenderMissions();
});

refreshMissions();
loadCards();
loadBoundaries();
</script>
</body>
</html>
